name: Sync docs to project-docs1 repo

on:
  push:
    paths:
      - "docs/docs1/**"
      - "docs/docs2/**"
      - "docs/docs3/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-docs1:
    runs-on: ubuntu-latest

    steps:
      # 開発リポジトリ1を取得
      - name: Checkout source repository
        uses: actions/checkout@v4

      # 公開リポジトリ1をクローン
      - name: Clone project-docs1 repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/hanihatena35-prog/project-docs1.git project-docs1_repo
      
      # Python実行環境準備
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      
      # Pythonスクリプト実行
      - name: Run Python script
        run: |
          python scripts/copy_docs.py

      # デバックを仕込む
      #- name: Debug (check files)
      # run: |
      #    echo "=== SOURCE (開発側) ==="
      #    find docs/docs1 -type f || true

      #    echo "=== DEST (公開側) ==="
      #    find project-docs1_repo -type f || true

      # copy
      - name: Copy project-docs
        run: |
          export SRC_DIR="docs/docs1"
          export DEST_DIR="project-docs1_repo/docs"
          python scripts/copy_docs.py

      # 変更がある場合のみcommit & push
      - name: Commit & Push changes
        run: |
          cd project-docs1_repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync Docs from Dev Repo on $(date +%Y%m%d%H%M)"
            git push
          fi

