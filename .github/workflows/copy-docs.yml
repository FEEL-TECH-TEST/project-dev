name: Sync Docs to Project-docs1 Repo

on:
  push:
    paths:
      - "Docs/Docs1/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      # 開発リポジトリを取得
      - name: Checkout source repository
        uses: actions/checkout@v4

      # 公開リポジトリをクローン
      - name: Clone public repository
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/hanihatena35-prog/project-docs1.git project-docs1_repo
      
      # Python実行環境準備
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      
      # Pythonスクリプト実行
      - name: Run Python script
        run: |
          python scripts/copy_docs.py

      # 変更がある場合のみcommit & push
      - name: Commit & Push changes
        run: |
          cd project-docs1_repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync Docs from Dev Repo on $(date +%Y%m%d%H%M)"
            git push
          fi
